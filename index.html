
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EFG MP3/AAC PLAYER - Banana v5</title>
    <style>
        :root {
            /* Banana Tactical Palette */
            --banana-yellow: #FFD700;
            --tactical-black: #1A1A1A;
            --winamp-gray: #2B2B2B;
            --winamp-green: #00FF00;
        }
        
        body {
            background-color: #050505;
            color: var(--banana-yellow);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        /* BANANA CHASSIS (Reconstructed with CSS Gradient) */
        .player-container {
            width: 100%;
            background: linear-gradient(135deg, #FFD700 0%, #FFC000 50%, #FFD700 100%);
            border-bottom: 4px solid var(--tactical-black);
            padding: 8px;
            box-sizing: border-box;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* DANCING WAVE VISUALIZER */
        #visualizer {
            width: 100%;
            height: 40px; 
            background: #000;
            border: 2px solid var(--tactical-black);
            margin-bottom: 5px;
            display: block;
        }

        /* DISPLAY PANEL */
        .display-panel {
            background: var(--tactical-black);
            border: 1px solid #333;
            padding: 8px;
            height: 50px; 
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* PLAYER TITLE */
        #song-title {
            font-size: 1.3rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--banana-yellow);
            text-shadow: 0 0 5px var(--banana-yellow);
        }
        
        /* TIME DISPLAY */
        .time-info { 
            font-size: 1.3rem; 
            font-weight: bold; 
            color: var(--winamp-green); 
        }
        
        /* CONTROLS AREA */
        .controls { 
            display: flex; 
            gap: 4px; 
            justify-content: center; 
            margin-top: 5px;
        }
        
        /* TACTICAL BUTTONS (Reconstructed with CSS) */
        button {
            background: linear-gradient(to bottom, #444 0%, #222 100%);
            border: 2px solid var(--tactical-black);
            color: #fff;
            font-size: 0.75rem; 
            padding: 10px; 
            cursor: pointer; 
            width: 23%;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
        }
        
        /* Button Active State (Yellow Flash) */
        button:active { 
            background: var(--banana-yellow); 
            color: #000; 
            border-color: #000;
        }
        
        /* CUSTOM FILE INPUT */
        input[type="file"] {
            font-size: 0.7rem; 
            width: 100%; 
            color: #aaa; 
            margin-bottom: 5px;
            background: var(--winamp-gray);
            border: 1px solid #444;
            padding: 2px;
        }
        
        /* SCROLLABLE PLAYLIST EDITOR */
        .playlist-container {
            width: 100%;
            background: var(--tactical-black);
            flex-grow: 1;
            overflow-y: auto;
            border-top: 2px solid var(--banana-yellow);
            -webkit-overflow-scrolling: touch;
        }
        
        .playlist-header {
            background: var(--banana-yellow); 
            color: #000; 
            font-size: 0.75rem;
            padding: 5px 10px; 
            text-transform: uppercase; 
            position: sticky; 
            top: 0;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        /* INDIVIDUAL SONG ITEM */
        .playlist-item {
            padding: 12px 15px; 
            font-size: 0.85rem;
            border-bottom: 1px solid #2a2a2a; 
            cursor: pointer;
            color: #ccc;
        }
        
        /* ACTIVE SONG IN PLAYLIST */
        .playlist-item.active {
            background: rgba(255, 215, 0, 0.1); /* Yellow tint */
            color: #fff; 
            border-left: 5px solid var(--banana-yellow);
            font-weight: bold;
            text-shadow: 0 0 5px #fff;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <canvas id="visualizer"></canvas>

        <div class="display-panel">
            <div align=center id="song-title">EFG MP3/AAC PLAYER</div>
            <div class="time-info" id="time">00:00</div>
        </div>
        
        <input type="file" id="fileInput" accept=".mp3, .m4a, .aac" multiple>
        
        <div class="controls">
            <button onclick="prev()">PREV</button>
            <button onclick="play()">PLAY</button>
            <button onclick="pause()">PAUSE</button>
            <button onclick="next()">NEXT</button>
        </div>
    </div>

    <div class="playlist-container">
        <div class="playlist-header">Tactical Playlist Editor</div>
        <div id="playlist-items">
            </div>
    </div>

    <audio id="audio" crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('audio');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('fileInput');
        const playlistItems = document.getElementById('playlist-items');
        const songTitle = document.getElementById('song-title');
        const timeDisplay = document.getElementById('time');

        let playlist = [];
        let currentIndex = 0;
        let audioCtx, analyser, source, dataArray;

        // Visualizer Setup Function
        function setupVisualizer() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 64; 
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                draw();
            } catch (e) {
                console.log("Tactical Error: AudioContext blocked.");
            }
        }

        // Draw Visualizer (Dancing Wave - Yellow Gold color)
        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const barWidth = (canvas.width / dataArray.length) * 2.5;
            let x = 0;

            for (let i = 0; i < dataArray.length; i++) {
                const barHeight = dataArray[i] / 3; 
                // Yellow-Gold Gradient bars
                ctx.fillStyle = `rgb(${barHeight + 150}, ${barHeight + 100}, 0)`;
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }

        // Handle File Selection
        fileInput.addEventListener('change', function() {
            const files = Array.from(this.files);
            files.forEach(file => {
                playlist.push({ 
                    name: file.name, 
                    url: URL.createObjectURL(file) 
                });
            });
            renderPlaylist();
        });

        // Render Playlist Items
        function renderPlaylist() {
            playlistItems.innerHTML = '';
            playlist.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `playlist-item ${index === currentIndex ? 'active' : ''}`;
                item.innerHTML = `<span>${index + 1}. ${song.name}</span>`;
                item.onclick = () => loadSong(index);
                playlistItems.appendChild(item);
            });
        }

        // Load and Play a Song
        function loadSong(index) {
            if (index < 0 || index >= playlist.length) return;
            setupVisualizer();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            currentIndex = index;
            audio.src = playlist[currentIndex].url;
            // Update Title (Fixed display issue)
            songTitle.textContent = playlist[currentIndex].name;
            renderPlaylist();
            audio.play();
        }

        // Control Functions
        function play() { 
            if(audio.src) {
                setupVisualizer();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                audio.play();
            } else {
                alert("Tactical Warning: No files loaded!");
            }
        }
        function pause() { audio.pause(); }
        function next() { loadSong(currentIndex + 1); }
        function prev() { loadSong(currentIndex - 1); }

        // Update Time Display
        audio.ontimeupdate = () => {
            const mins = Math.floor(audio.currentTime / 60);
            const secs = Math.floor(audio.currentTime % 60);
            timeDisplay.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        };

        // Auto Next on End
        audio.onended = () => next();
    </script>
</body>
</html>
